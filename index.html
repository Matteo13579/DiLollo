<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spesa Condivisa 🛒</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex flex-col items-center justify-center p-4">

    <div class="bg-white w-full max-w-sm rounded-3xl shadow-xl overflow-hidden border border-slate-100">

        <div class="bg-indigo-600 p-6 text-center">
            <div class="bg-white/20 w-16 h-16 rounded-2xl flex items-center justify-center mx-auto mb-4 backdrop-blur-sm">
                <span class="text-3xl">🛒</span>
            </div>
            <h1 class="text-white text-xl font-bold">Spesa di Gruppo</h1>
            <p class="text-indigo-100 text-sm opacity-80">Inserisci le tue credenziali</p>
        </div>

        <div id="login-section" class="p-8 space-y-5">
            <div>
                <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1">Email</label>
                <input type="email" id="email" placeholder="nome@esempio.it"
                    class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all">
            </div>

            <div>
                <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1">Password</label>
                <input type="password" id="password" placeholder="••••••••"
                    class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all">
            </div>

            <button onclick="handleLogin()" id="login-btn"
                class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 px-4 rounded-xl shadow-lg shadow-indigo-200 transition-all active:scale-95 flex items-center justify-center space-x-2">
                <span>Accedi</span>
                <svg id="loader" class="hidden animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
            </button>

            <div id="api-feedback" class="hidden text-center p-3 rounded-lg text-sm font-medium"></div>
        </div>

        <div id="dashboard-section" class="hidden p-8 text-center space-y-4">
            <div class="text-green-500 text-5xl mb-2">✅</div>
            <h2 class="text-xl font-bold text-slate-800">Sei dentro!</h2>
            <p id="api-message" class="text-slate-600 text-sm bg-slate-100 p-3 rounded-lg"></p>
            <button onclick="location.reload()" class="text-indigo-600 font-semibold text-sm hover:underline">Torna indietro</button>
        </div>
    </div>

    <p class="mt-8 text-slate-400 text-xs">Versione 0.1 • Collegato a FastAPI</p>

    <script>
        async function handleLogin() {
            const btn = document.getElementById('login-btn');
            const loader = document.getElementById('loader');
            const feedback = document.getElementById('api-feedback');
            const loginSection = document.getElementById('login-section');
            const dashboardSection = document.getElementById('dashboard-section');
            const apiMessage = document.getElementById('api-message');

            // Stato di caricamento
            btn.disabled = true;
            loader.classList.remove('hidden');
            feedback.classList.add('hidden');

            try {
                // Chiamata reale al tuo endpoint FastAPI su Vercel
                const response = await fetch('/api/healthcheck');
                const data = await response.json();

                if (response.ok) {
                    // Simuliamo un piccolo ritardo per vedere l'animazione
                    setTimeout(() => {
                        loginSection.classList.add('hidden');
                        dashboardSection.classList.remove('hidden');
                        apiMessage.innerText = data.message;
                    }, 800);
                } else {
                    throw new Error();
                }
            } catch (error) {
                feedback.innerText = "❌ Impossibile connettersi al backend";
                feedback.classList.remove('hidden', 'text-green-600', 'bg-green-50');
                feedback.classList.add('text-red-600', 'bg-red-50');
                btn.disabled = false;
                loader.classList.add('hidden');
            }
        }
    </script>
</body>
</html>
